name: qr_brightness_guard_example
description: Demonstrates qr_brightness_guard with real brightness and wakelock backends.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  qr_brightness_guard:
    path: ../
  qr_screen_brightness: ^0.0.1
  wakelock_plus: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
